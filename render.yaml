services:
  - type: web
    name: swissgardenperfumes
    env: node
    plan: free
    # Installs server + client deps (client incl. dev deps for Vite), builds the
    # client bundle, then `npm start` runs the Express server which also serves
    # the built client. Commands live in the root package.json (single source).
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20

      # ── URLs are auto-detected ───────────────────────────────────
      # The app derives client/server/OAuth-callback URLs from Render's
      # built-in RENDER_EXTERNAL_URL, so the default *.onrender.com URL works
      # with NO manual URL config. Only set CLIENT_URL (and register the OAuth
      # callback in Google) if you attach a custom domain.

      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 30d
      - key: JWT_COOKIE_EXPIRE
        value: 30

      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false

      # Email — code reads SMTP_*/FROM_* (the old EMAIL_* names were dead).
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_NAME
        value: SwissGarden Perfumes
      - key: FROM_EMAIL
        sync: false
