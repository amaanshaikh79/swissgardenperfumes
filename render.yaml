services:
  - type: web
    name: swissgardenperfumes
    env: node
    plan: free
    # Installs server + client deps (client incl. dev deps for Vite), builds the
    # client bundle, then `npm start` runs the Express server which also serves
    # the built client. Commands live in the root package.json (single source).
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20

      # Canonical public origin — drives sitemap <loc>, server-injected canonicals,
      # og:url, and JSON-LD URLs. Set to the custom domain so these never emit the
      # default *.onrender.com host.
      - key: SITE_URL
        value: https://swissgardenperfumes.com

      # ── URLs are auto-detected ───────────────────────────────────
      # The app derives client/server/OAuth-callback URLs from Render's
      # built-in RENDER_EXTERNAL_URL, so the default *.onrender.com URL works
      # with NO manual URL config. Only set CLIENT_URL (and register the OAuth
      # callback in Google) if you attach a custom domain.

      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 30d
      - key: JWT_COOKIE_EXPIRE
        value: 30

      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false

      # Email — code reads SMTP_*/FROM_* (the old EMAIL_* names were dead).
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_NAME
        value: SwissGarden Perfumes
      - key: FROM_EMAIL
        sync: false
      # Store-alert recipient (contact form, RTO, new returns); falls back to SMTP_EMAIL
      - key: ADMIN_EMAIL
        value: support@swissgardenperfumes.com

      # Brevo HTTPS email API — REQUIRED on Render: GoDaddy SMTP is unreachable
      # from cloud IPs on all ports (verified July 2026). Create the key at
      # brevo.com (free 300/day) and set it in the dashboard.
      - key: BREVO_API_KEY
        sync: false

      # ── Shiprocket fulfilment ────────────────────────────────────
      # API-user credentials (Settings → API → Configure user). The dashboard
      # passes values raw, so special characters (# $) need no quoting here.
      - key: SHIPROCKET_EMAIL
        sync: false
      - key: SHIPROCKET_PASSWORD
        sync: false
      - key: SHIPROCKET_CHANNEL_ID
        value: "11393170"
      - key: SHIPROCKET_PICKUP_LOCATION
        value: Primary
      - key: SHIPROCKET_PICKUP_PINCODE
        value: "110025"
      - key: SHIPROCKET_WEBHOOK_TOKEN
        sync: false

      # ── AI Chatbot (OpenRouter) ──────────────────────────────────
      # Rotate the key at https://openrouter.ai/keys after first deploy
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.3-70b-instruct:free
      - key: OPENROUTER_FALLBACK_MODELS
        value: google/gemma-4-31b-it:free,openai/gpt-oss-20b:free,qwen/qwen3-next-80b-a3b-instruct:free,nvidia/nemotron-3-super-120b-a12b:free,meta-llama/llama-3.2-3b-instruct:free
      - key: CHAT_INCLUDE_PII
        value: "true"
